<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Days Gone Clone</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #1a1d24;
        font-family: system-ui, sans-serif;
      }
      #app {
        width: 100%;
        height: 100%;
      }
      canvas {
        display: block;
      }
      #click-to-play {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 12px;
        color: #cfd6e4;
        background: rgba(10, 12, 16, 0.65);
        cursor: pointer;
        user-select: none;
        z-index: 10;
      }
      #click-to-play h1 {
        font-size: 28px;
        margin: 0;
        letter-spacing: 2px;
      }
      #click-to-play p {
        margin: 0;
        opacity: 0.7;
      }
      #click-to-play.hidden {
        display: none;
      }
      #loading {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #cfd6e4;
        background: #14161c;
        z-index: 20;
      }
      #loading.hidden {
        display: none;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div id="loading">Loading…</div>
    <div id="click-to-play" class="hidden">
      <h1>DAYS GONE CLONE</h1>
      <p>Click to play &mdash; WASD move &middot; Shift sprint &middot; Space roll &middot; RMB aim &middot; LMB shoot</p>
      <p>R reload &middot; 1/2/3 weapons &middot; V melee &middot; G grenade &middot; F molotov &middot; E enter car &middot; Esc release mouse</p>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
